<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User API Dashboard</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg"></div>
    
    <div class="app-container">
        <!-- HEADER -->
        <header class="app-header">
            <div class="brand">
                <i class="fa-solid fa-users-gear brand-icon"></i>
                <div>
                    <h1>User Management Portal</h1>
                    <p class="subtitle">GoFiber + PostgreSQL + SQLC API Engine</p>
                </div>
            </div>
            <div class="api-status-widget" id="api-status-widget">
                <span class="status-dot pulsing"></span>
                <span class="status-text">Checking Connection...</span>
            </div>
        </header>

        <!-- MAIN CONTENT GRID -->
        <main class="dashboard-grid">
            
            <!-- LEFT COLUMN: INPUT FORM -->
            <section class="card form-card">
                <div class="card-header">
                    <i class="fa-solid fa-user-plus card-icon" id="form-icon"></i>
                    <h2 id="form-title">Register New User</h2>
                </div>
                <form id="user-form" novalidate>
                    <input type="hidden" id="user-id">
                    
                    <div class="form-group">
                        <label for="user-name">Full Name</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user input-icon"></i>
                            <input type="text" id="user-name" placeholder="e.g. Tony Stark" required autocomplete="off">
                        </div>
                        <div class="error-msg" id="name-error">Name is required</div>
                    </div>
                    
                    <div class="form-group">
                        <label for="user-dob">Date of Birth</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-calendar input-icon"></i>
                            <input type="date" id="user-dob" required>
                        </div>
                        <div class="error-msg" id="dob-error">Valid date of birth is required</div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="btn-submit">
                            <span id="btn-text">Create User</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                        <button type="button" class="btn btn-secondary" id="btn-cancel" style="display: none;">
                            <span>Cancel</span>
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </form>
            </section>
            
            <!-- RIGHT COLUMN: USERS LIST -->
            <section class="card list-card">
                <div class="card-header list-header">
                    <div class="header-left">
                        <i class="fa-solid fa-database card-icon"></i>
                        <h2>Database Registry</h2>
                    </div>
                    <div class="registry-stats">
                        <span class="badge" id="total-users-badge">0 Users</span>
                    </div>
                </div>
                
                <div class="table-container">
                    <table class="users-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>User Profile</th>
                                <th>Date of Birth</th>
                                <th>Age</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <!-- Dynamically filled -->
                            <tr>
                                <td colspan="5" class="table-loading">
                                    <div class="spinner"></div>
                                    <span>Querying database...</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- PAGINATION AND PAGE CONTROLS -->
                <div class="pagination-footer">
                    <div class="page-size-selector">
                        <label for="page-size">Show:</label>
                        <select id="page-size">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="25">25</option>
                        </select>
                    </div>
                    
                    <div class="pagination-controls">
                        <button class="btn-pagination" id="btn-prev" disabled>
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <span class="pagination-info" id="pagination-info">Page 1 of 1</span>
                        <button class="btn-pagination" id="btn-next" disabled>
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- TOAST NOTIFICATIONS -->
    <div class="toast-container" id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
